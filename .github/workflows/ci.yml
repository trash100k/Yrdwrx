name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # No secrets are provided: the server runs in mock mode (no GEMINI_API_KEY, no Firebase),
    # so lint + tests are fully hermetic and require no external services.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (type-check)
        run: npm run lint

      - name: Test
        run: npm run test
